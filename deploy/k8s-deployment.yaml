apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-eval-engine
  labels:
    app: ai-eval-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-eval-engine
  template:
    metadata:
      labels:
        app: ai-eval-engine
    spec:
      containers:
        - name: api
          image: ai-eval-engine:latest
          ports:
            - containerPort: 8000
          env:
            - name: INFERENCE_BACKEND
              value: "vllm"
            - name: VLLM_BASE_URL
              value: "http://vllm-service:8000/v1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eval-engine-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: eval-engine-secrets
                  key: redis-url
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-eval-engine-service
spec:
  selector:
    app: ai-eval-engine
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
